<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inspectr</title>
    <link
      rel="shortcut icon"
      href="./assets/graphics/favicon-v2.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section id="init-prompt">
        <div>
          <div></div>
        </div>
        <img src="./assets/graphics/logo-v2.svg" alt="Logomarca inspectr" />
        <small class="center">Conferências mais eficientes</small>
        <button id="new-inspect-btn" class="accent-btn button" type="button">
          Começar
          <img
            src="./assets/graphics/icon-scan.svg"
            alt="ícone de código de barras"
          />
        </button>
        <button id="resume-inspect-btn" type="button" class="clear-btn button">
          Retomar conferência
          <img
            src="./assets/graphics/icon-reverse-clock.svg"
            alt="ícone de relógio"
          />
        </button>
      </section>

      <section id="set-sku-sect">
        <h2>
          <img src="./assets/graphics/icon-scan-alt.svg" alt="" />
          Nova Conferência
        </h2>
        <form id="ref-sku-form" action="">
          <input
            type="text"
            id="ref-sku-input"
            placeholder="Ex.: (240)10221234"
            maxlength="13"
          />
          <p id="ref-sku-msg" class="center">
            Escaneie a <span class="bold">SKU</span> de qualquer caixa do pallet
            para iniciar a conferência.
          </p>
          <div class="action-btns-container">
            <small class="center dim">Somente SKUs válidas serão aceitas</small>
            <input class="accent-btn button" type="submit" value="Confirmar" />
            <button
              id="cancel-set-sku-btn"
              class="clear-btn button"
              type="button"
            >
              Cancelar
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
