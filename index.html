<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inspectr</title>
    <link
      rel="shortcut icon"
      href="./assets/graphics/favicon-v2.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section id="init-prompt">
        <div>
          <div></div>
        </div>
        <img src="./assets/graphics/logo-v2.svg" alt="Logomarca inspectr" />
        <small>Sua conferência de pallets mais eficiente</small>
        <button id="new-inspect-btn" class="accent-btn" type="button">
          Nova conferência
          <img
            src="./assets/graphics/icon-scan.svg"
            alt="ícone de código de barras"
          />
        </button>
        <button id="resume-inspect-btn" type="button" class="clear-btn">
          Continuar uma conferência anterior
          <img
            src="./assets/graphics/icon-reverse-clock.svg"
            alt="ícone de relógio"
          />
        </button>
      </section>
    </main>
    <div
      id="new-inspect-modal-mask"
      onclick="hideElements(['new-inspect-modal', 'new-inspect-modal-mask'])"
    ></div>
    <div id="new-inspect-modal">
      <small class="uppercase dim">Nova Conferência</small>
      <p class="center">Digite ou escaneie a primeira SKU neste pallet</p>
      <form id="ref-sku-form" action="">
        <input
          type="text"
          id="ref-sku-input"
          placeholder="(240)10221234"
          maxlength="13"
          minlength="13"
          pattern="^\(240\)\d{8}$"
          title="Escaneie somente uma SKU válida"
          required
        />
        <input class="accent-btn" type="submit" value="Confirmar" />
      </form>
      <button
        onclick="hideElements(['new-inspect-modal', 'new-inspect-modal-mask'])"
        class="clear-btn"
        type="button"
      >
        Cancelar
      </button>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
